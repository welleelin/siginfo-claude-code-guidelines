name: Design Sync

on:
  push:
    paths:
      - 'designs/**'
  pull_request:
    paths:
      - 'designs/**'

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g pixelmatch-cli
          sudo apt-get update
          sudo apt-get install -y imagemagick jq

      - name: Validate Design Files
        run: |
          chmod +x ./scripts/validate-design-files.sh
          ./scripts/validate-design-files.sh

      - name: Extract Design Tokens
        run: |
          chmod +x ./scripts/extract-design-tokens.sh
          ./scripts/extract-design-tokens.sh

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet design-tokens/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Design Tokens
        if: steps.check_changes.outputs.has_changes == 'true' && github.event_name == 'push'
        run: |
          git config user.name "Design Bot"
          git config user.email "bot@github-actions"
          git add design-tokens/
          git commit -m "chore: update design tokens [skip ci]"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-validation-report
          path: |
            designs/.validation-report.txt
            design-tokens/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('designs/.validation-report.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎨 设计文件变更检测\n\n设计 Token 已更新。请查看以下报告：\n\n\`\`\`\n${report}\n\`\`\``
            });
