<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGINFO-Claude 开发环境</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Notion 风格 - 温暖舒适的设计 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .toc-sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            background-color: #f7f6f3;
            padding: 24px 20px;
            border-right: 1px solid #e9e9e7;
        }
        .toc-sidebar h3 {
            color: #37352f;
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 16px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 10px 14px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            color: #37352f;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .search-input:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
        }
        .search-input::placeholder {
            color: #9b9a97;
        }
        .search-result-count {
            margin-top: 8px;
            font-size: 12px;
            color: #9b9a97;
        }
        .toc-list a.search-highlight {
            background-color: #fff7d1;
            border-left: 3px solid #ffd33d;
        }
        .markdown-body mark.search-highlight-content {
            background-color: #fff7d1;
            color: #37352f;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .toc-list li {
            margin: 0;
            padding: 0;
        }
        .toc-item {
            position: relative;
        }
        .toc-item-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toc-number {
            color: #9b9a97;
            font-size: 12px;
            margin-right: 4px;
            flex-shrink: 0;
            font-weight: 500;
        }
        .toc-toggle {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #9b9a97;
            font-size: 12px;
            flex-shrink: 0;
            transition: all 0.2s;
            border-radius: 3px;
        }
        .toc-toggle:hover {
            background-color: rgba(0, 0, 0, 0.05);
            color: #37352f;
        }
        .toc-toggle.collapsed {
            transform: rotate(-90deg);
        }
        .toc-toggle.empty {
            visibility: hidden;
        }
        .toc-list a {
            display: block;
            padding: 8px 10px;
            color: #6e6d6a;
            text-decoration: none;
            font-size: 14px;
            border-radius: 6px;
            transition: all 0.15s;
            flex: 1;
            line-height: 1.4;
        }
        .toc-list a:hover {
            background-color: rgba(0, 0, 0, 0.05);
            color: #37352f;
        }
        .toc-list a.active {
            background-color: #e9e9e7;
            color: #37352f;
            font-weight: 600;
        }
        .toc-children {
            list-style: none;
            padding-left: 20px;
            margin: 4px 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .toc-children.collapsed {
            max-height: 0 !important;
        }
        .toc-h1 a {
            font-weight: 600;
            font-size: 14px;
            color: #37352f;
        }
        .toc-h2 a {
            font-size: 14px;
        }
        .toc-h3 a {
            font-size: 13px;
        }
        .toc-h4 a {
            font-size: 12px;
            color: #9b9a97;
        }
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 48px 96px;
            background-color: #ffffff;
        }
        .markdown-body {
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            padding: 0;
            background-color: transparent;
            border-radius: 0;
            box-shadow: none;
            line-height: 1.7;
        }
        .markdown-body h1 {
            font-size: 36px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 24px;
            color: #37352f;
        }
        .markdown-body h2 {
            font-size: 28px;
            font-weight: 600;
            margin-top: 32px;
            margin-bottom: 16px;
            color: #37352f;
        }
        .markdown-body h3 {
            font-size: 22px;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 12px;
            color: #37352f;
        }
        .markdown-body p {
            margin-bottom: 16px;
            color: #37352f;
        }
        .markdown-body code {
            background-color: #f7f6f3;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background-color: #f7f6f3;
            border-radius: 8px;
            padding: 16px;
        }
        @media (max-width: 1024px) {
            .content-wrapper {
                padding: 32px 48px;
            }
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .toc-sidebar {
                width: 100%;
                height: auto;
                max-height: 400px;
                position: static;
                border-right: none;
                border-bottom: 1px solid #e9e9e7;
            }
            .content-wrapper {
                padding: 24px 20px;
            }
            .markdown-body h1 {
                font-size: 28px;
            }
            .markdown-body h2 {
                font-size: 22px;
            }
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #9b9a97;
        }
        /* 滚动条样式 - Notion 风格 */
        .toc-sidebar::-webkit-scrollbar {
            width: 8px;
        }
        .toc-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .toc-sidebar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .toc-sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="toc-sidebar">
            <h3>📑 目录</h3>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文档内容...">
                <div class="search-result-count" id="searchResultCount"></div>
            </div>
            <ul class="toc-list" id="toc"></ul>
        </aside>
        <div class="content-wrapper">
            <div class="markdown-body" id="content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 配置 marked 选项
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });

        // 生成树形目录
        function generateTOC() {
            const content = document.getElementById('content');
            const headings = content.querySelectorAll('h1, h2, h3, h4');
            const tocList = document.getElementById('toc');
            tocList.innerHTML = '';

            // 构建树形结构
            const tree = [];
            const stack = [{ level: 0, children: tree }];

            headings.forEach((heading, index) => {
                const level = parseInt(heading.tagName.substring(1));
                const text = heading.textContent;
                const id = `heading-${index}`;
                heading.id = id;

                const node = {
                    level,
                    text,
                    id,
                    heading,
                    children: []
                };

                // 找到合适的父节点
                while (stack.length > 1 && stack[stack.length - 1].level >= level) {
                    stack.pop();
                }

                stack[stack.length - 1].children.push(node);
                stack.push(node);
            });

            // 渲染树形结构
            function renderTree(nodes, parentUl, parentNumber = '') {
                nodes.forEach((node, index) => {
                    const li = document.createElement('li');
                    li.className = 'toc-item';

                    const header = document.createElement('div');
                    header.className = 'toc-item-header';

                    // 展开/折叠按钮
                    const toggle = document.createElement('span');
                    toggle.className = 'toc-toggle collapsed';
                    toggle.innerHTML = '▶';

                    if (node.children.length === 0) {
                        toggle.classList.add('empty');
                    }

                    // 序号
                    const number = parentNumber ? `${parentNumber}.${index + 1}` : `${index + 1}`;
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'toc-number';
                    numberSpan.textContent = number;

                    // 链接
                    const a = document.createElement('a');
                    a.href = `#${node.id}`;
                    a.textContent = node.text;
                    a.className = `toc-h${node.level}`;
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        node.heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        document.querySelectorAll('.toc-list a').forEach(link => {
                            link.classList.remove('active');
                        });
                        a.classList.add('active');
                    });

                    header.appendChild(toggle);
                    header.appendChild(numberSpan);
                    header.appendChild(a);
                    li.appendChild(header);

                    // 子节点
                    if (node.children.length > 0) {
                        const childUl = document.createElement('ul');
                        childUl.className = 'toc-children collapsed';
                        childUl.style.maxHeight = '0';
                        renderTree(node.children, childUl, number);
                        li.appendChild(childUl);

                        // 展开/折叠功能
                        toggle.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const isCollapsed = childUl.classList.contains('collapsed');

                            if (isCollapsed) {
                                childUl.style.maxHeight = childUl.scrollHeight + 'px';
                                childUl.classList.remove('collapsed');
                                toggle.classList.remove('collapsed');
                                toggle.innerHTML = '▼';
                            } else {
                                childUl.style.maxHeight = '0';
                                childUl.classList.add('collapsed');
                                toggle.classList.add('collapsed');
                                toggle.innerHTML = '▶';
                            }
                        });
                    }

                    parentUl.appendChild(li);
                });
            }

            renderTree(tree, tocList);

            // 监听滚动，高亮当前章节
            setupScrollSpy(headings);
        }

        // 滚动监听
        function setupScrollSpy(headings) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        document.querySelectorAll('.toc-list a').forEach(link => {
                            link.classList.remove('active');
                            if (link.getAttribute('href') === `#${id}`) {
                                link.classList.add('active');
                            }
                        });
                    }
                });
            }, {
                rootMargin: '-100px 0px -80% 0px'
            });

            headings.forEach(heading => observer.observe(heading));
        }

        // 搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResultCount = document.getElementById('searchResultCount');
            const content = document.getElementById('content');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim().toLowerCase();

                // 清除之前的高亮
                document.querySelectorAll('.toc-list a').forEach(link => {
                    link.classList.remove('search-highlight');
                });

                if (!query) {
                    searchResultCount.textContent = '';
                    // 清除内容区域的高亮
                    content.innerHTML = content.innerHTML.replace(/<mark class="search-highlight-content">(.*?)<\/mark>/g, '$1');
                    return;
                }

                // 搜索目录
                const tocLinks = document.querySelectorAll('.toc-list a');
                let tocMatches = 0;
                tocLinks.forEach(link => {
                    if (link.textContent.toLowerCase().includes(query)) {
                        link.classList.add('search-highlight');
                        tocMatches++;

                        // 展开父节点
                        let parent = link.closest('.toc-children');
                        while (parent) {
                            if (parent.classList.contains('collapsed')) {
                                parent.style.maxHeight = parent.scrollHeight + 'px';
                                parent.classList.remove('collapsed');
                                const toggle = parent.previousElementSibling?.querySelector('.toc-toggle');
                                if (toggle) {
                                    toggle.classList.remove('collapsed');
                                }
                            }
                            parent = parent.parentElement.closest('.toc-children');
                        }
                    }
                });

                // 搜索内容区域
                const textContent = content.textContent.toLowerCase();
                const contentMatches = (textContent.match(new RegExp(query, 'g')) || []).length;

                // 高亮内容区域的匹配文本
                highlightContentMatches(query);

                // 显示结果统计
                const total = tocMatches + contentMatches;
                if (total > 0) {
                    searchResultCount.textContent = `找到 ${total} 个结果 (目录: ${tocMatches}, 内容: ${contentMatches})`;
                } else {
                    searchResultCount.textContent = '未找到匹配结果';
                }
            });
        }

        // 高亮内容区域的匹配文本
        function highlightContentMatches(query) {
            const content = document.getElementById('content');
            const walker = document.createTreeWalker(
                content,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );

            const nodesToReplace = [];
            let node;
            while (node = walker.nextNode()) {
                if (node.nodeValue.toLowerCase().includes(query)) {
                    nodesToReplace.push(node);
                }
            }

            nodesToReplace.forEach(node => {
                const parent = node.parentNode;
                if (parent.tagName !== 'SCRIPT' && parent.tagName !== 'STYLE') {
                    const regex = new RegExp(`(${query})`, 'gi');
                    const highlighted = node.nodeValue.replace(regex, '<mark class="search-highlight-content">$1</mark>');
                    const span = document.createElement('span');
                    span.innerHTML = highlighted;
                    parent.replaceChild(span, node);
                }
            });
        }

        // 加载并渲染 Markdown
        fetch('README.md')
            .then(response => response.text())
            .then(markdown => {
                document.getElementById('content').innerHTML = marked.parse(markdown);

                // 生成目录
                generateTOC();

                // 设置搜索功能
                setupSearch();

                // 为所有链接添加处理
                document.querySelectorAll('.markdown-body a').forEach(link => {
                    const href = link.getAttribute('href');
                    // 如果是相对路径的 .md 文件，转换为可预览的链接
                    if (href && href.endsWith('.md') && !href.startsWith('http')) {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            loadMarkdownFile(href);
                        });
                    }
                });
            })
            .catch(error => {
                document.getElementById('content').innerHTML =
                    '<div class="loading">加载失败: ' + error.message + '</div>';
            });

        // 加载其他 Markdown 文件
        function loadMarkdownFile(path) {
            document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';

            fetch(path)
                .then(response => response.text())
                .then(markdown => {
                    document.getElementById('content').innerHTML = marked.parse(markdown);
                    window.scrollTo(0, 0);

                    // 添加返回按钮
                    const backButton = document.createElement('div');
                    backButton.innerHTML = '<a href="/" style="display: inline-block; margin-bottom: 20px; padding: 8px 16px; background: #0969da; color: white; text-decoration: none; border-radius: 6px;">← 返回首页</a>';
                    document.getElementById('content').insertBefore(backButton, document.getElementById('content').firstChild);

                    // 重新生成目录
                    generateTOC();

                    // 为新加载的内容中的链接添加处理
                    document.querySelectorAll('.markdown-body a').forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && href.endsWith('.md') && !href.startsWith('http')) {
                            link.addEventListener('click', (e) => {
                                e.preventDefault();
                                loadMarkdownFile(href);
                            });
                        }
                    });
                })
                .catch(error => {
                    document.getElementById('content').innerHTML =
                        '<div class="loading">加载失败: ' + error.message + '</div>';
                });
        }
    </script>
</body>
</html>
